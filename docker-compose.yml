version: '3.8'

services:
  # ANT AGENT Main Service
  ant-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ant-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - SOLANA_COMMITMENT=${SOLANA_COMMITMENT}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - OPENCLAW_COLONY=${OPENCLAW_COLONY}
      - MAX_SLIPPAGE=${MAX_SLIPPAGE}
      - MAX_POSITION_SIZE=${MAX_POSITION_SIZE}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ant-agent-data:/app/data
      - ant-agent-logs:/app/logs
    networks:
      - ant-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: ant-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ant-network
    command: redis-server --appendonly yes

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ant-agent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ant-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ant-agent-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - ant-network
    depends_on:
      - prometheus

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ant-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./src/dapp:/usr/share/nginx/html
    networks:
      - ant-network
    depends_on:
      - ant-agent

volumes:
  ant-agent-data:
  ant-agent-logs:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  ant-network:
    driver: bridge
